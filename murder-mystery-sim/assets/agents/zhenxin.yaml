  initial_hypothesis: "贾钟不对劲——血脉反应不会骗人"
  belief_anchors:
    - "风不闻永远值得保护"
    - "直觉比逻辑更可靠"
    - "战场上的兄弟不会背叛"
  malleable_beliefs:
    - "轩辕离是敌是友"
    - "萧澄到底在打什么算盘"
    - "慕容霜是不是在利用所有人"
  turning_points: []

relationships:
  风不闻: { trust: 0.95, suspicion: 0.00, affinity: 0.95, notes: "用命去守护的人" }
  贾钟: { trust: -0.50, suspicion: 0.85, affinity: -0.60, notes: "血脉在警告我" }
  沐天成: { trust: 0.80, suspicion: 0.00, affinity: 0.70, notes: "老兵战友，信得过" }
  轩辕离: { trust: -0.20, suspicion: 0.15, affinity: -0.40, notes: "小皇帝，对风不闻有敌意" }
  萧澄: { trust: -0.10, suspicion: 0.40, affinity: -0.30, notes: "总感觉在藏什么" }
  云溪: { trust: 0.80, suspicion: 0.00, affinity: 0.75, notes: "安静的姑娘，眼睛很亮" }
  慕容霜: { trust: 0.20, suspicion: 0.20, affinity: 0.10, notes: "皇后城府太深，不好读" }
